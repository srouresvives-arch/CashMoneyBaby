const genMonths=()=>{const l=[];const now=new Date();const y=now.getFullYear();const m=now.getMonth();for(let i=-3;i<=14;i++){const d=new Date(y,m+i,1);const my=d.getFullYear();const mm=d.getMonth();l.push({key:`${my}-${String(mm+1).padStart(2,'0')}`,label:`${MES[mm]} ${my}`,month:MES[mm],year:my});}return l;};

const waitFS=()=>new Promise(r=>{if(window._fsReady)return r();window.addEventListener('fsReady',r,{once:true});setTimeout(r,8000);});

const dbLoad=async(uid,key,fallback)=>{
  try{
    await waitFS();
    const snap=await window._getDoc(window._doc(window._db,`users/${uid}/data`,key));
    if(!snap.exists())return fallback;
    const val=snap.data().v;
    if(Array.isArray(fallback)&&!Array.isArray(val))return fallback;
    if(fallback!==null&&typeof fallback==='object'&&!Array.isArray(fallback)&&(typeof val!=='object'||Array.isArray(val)))return fallback;
    return val!=null?val:fallback;
  }catch(e){console.error('dbLoad',key,e);return fallback;}
};

const dbSave=async(uid,key,val)=>{
  try{
    await waitFS();
    await window._setDoc(window._doc(window._db,`users/${uid}/data`,key),{v:val});
  }catch(e){console.error('dbSave',key,e);}
};

const QuickExpenseModal=({cats,exps,uExps,mlist,exRate,currency,theme,onClose})=>{
  const [amt,setAmt]=useState('');
  const [cur,setCur]=useState(currency);
  const [selMonth,setSelMonth]=useState('');
  const [selCatId,setSelCatId]=useState(cats[0]?.id||null);
  const amtRef=useRef(null);
  useEffect(()=>{setTimeout(()=>amtRef.current?.focus(),300);},[]);
  const today=new Date();
  const defKey=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
  const defMonth=mlist.find(m=>m.key===defKey)||mlist[0];
  const confirm=()=>{
    if(!selCatId||!amt)return;
    const gbp=cur==='EUR'?(parseFloat(amt)||0)/exRate:(parseFloat(amt)||0);
    const mk=selMonth||defMonth?.key;
    if(!mk)return;
    const idx=exps.findIndex(x=>x.cid===selCatId&&x.mk===mk);
    let up;
    if(idx>=0){up=[...exps];up[idx]={...up[idx],amountGBP:(up[idx].amountGBP||0)+gbp};}
    else up=[...exps,{id:Date.now(),cid:selCatId,mk,amountGBP:gbp}];
    uExps(up);onClose();
  };
  return(
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal-sheet" style={{background:theme.bg2,border:`1px solid ${theme.border}`}}>
        <div style={{width:40,height:4,borderRadius:2,background:theme.border,margin:'0 auto 20px'}}/>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:20}}>
          <div style={{width:38,height:38,borderRadius:12,background:theme.accent2,display:'flex',alignItems:'center',justifyContent:'center',color:theme.accent}}><ZapIc/></div>
          <p style={{margin:0,fontWeight:700,fontSize:17,color:theme.text}}>Gasto rápido</p>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr auto',gap:10}}>
            <div><label style={{fontSize:11,color:theme.text3,display:'block',marginBottom:5,fontWeight:500,textTransform:'uppercase',letterSpacing:.5}}>Cantidad</label>
              <input ref={amtRef} id="qamt" type="number" inputMode="decimal" value={amt} onChange={e=>setAmt(e.target.value)} placeholder="0.00" className="inp" style={{background:theme.bg,border:`1px solid ${theme.border}`,color:theme.text}} onKeyDown={e=>e.key==='Enter'&&confirm()}/></div>
            <div style={{paddingTop:20}}><select value={cur} onChange={e=>setCur(e.target.value)} className="inp" style={{background:theme.bg,border:`1px solid ${theme.border}`,color:theme.text,appearance:'none',width:80}}><option value="GBP">£ GBP</option><option value="EUR">€ EUR</option></select></div>
          </div>
          <div><label style={{fontSize:11,color:theme.text3,display:'block',marginBottom:5,fontWeight:500,textTransform:'uppercase',letterSpacing:.5}}>Mes</label>
            <select value={selMonth||defMonth?.key||''} onChange={e=>setSelMonth(e.target.value)} className="inp" style={{background:theme.bg,border:`1px solid ${theme.border}`,color:theme.text,appearance:'none'}}>{mlist.map(m=><option key={m.key} value={m.key}>{m.label}</option>)}</select>
          </div>
          <div><label style={{fontSize:11,color:theme.text3,display:'block',marginBottom:8,fontWeight:500,textTransform:'uppercase',letterSpacing:.5}}>Categoría</label>

                <span style={{fontSize:14,fontWeight:selCatId===cat.id?600:400,color:selCatId===cat.id?theme.accent:theme.text2}}>{cat.name}</span>

              </button>))}

const Login=()=>{
  const t=THEMES.midnight;
  const [em,setEm]=useState('');const [pw,setPw]=useState('');const [err,setErr]=useState('');const [ld,setLd]=useState(false);const [mode,setMode]=useState('login');
  const go=async()=>{
    if(!em||!pw)return setErr('Introduce email y contraseña');
    setLd(true);setErr('');
    try{if(mode==='login')await window._signIn(em,pw);else await window._signUp(em,pw);}

              <button key={m} onClick={()=>setMode(m)} style={{flex:1,padding:'9px',border:'none',borderRadius:8,background:mode===m?t.accent:'transparent',color:mode===m?'#fff':t.text3,fontWeight:600,fontSize:13,cursor:'pointer',transition:'all .2s',fontFamily:'DM Sans'}}>

          </div>

          <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Contraseña" onKeyDown={e=>e.key==='Enter'&&go()} style={{background:t.bg,border:`1px solid ${t.border}`,color:t.text,borderRadius:10,padding:'11px 14px',width:'100%',fontFamily:'DM Sans',fontSize:15,outline:'none'}}/>

};

const App=()=>{
  const [user,setUser]=useState(undefined);
  const [view,setView]=useState('home');
  const [ld,setLd]=useState(true);
  const [sync,setSync]=useState(false);
  const [themeName,setThemeName]=useState('midnight');
  const [currency,setCurrency]=useState('GBP');
  const [exRate,setExRate]=useState(1.17);
  const theme=THEMES[themeName]||THEMES.midnight;
  const [dist,setDist]=useState(DEF_DIST());
  const [accs,setAccs]=useState(DEF_ACCS());
  const [savs,setSavs]=useState([]);
  const [cats,setCats]=useState(DEF_CATS());
  const [exps,setExps]=useState([]);
  const [goals,setGoals]=useState([]);
  const [mlist,setMlist]=useState(genMonths());
  const [showQuick,setShowQuick]=useState(false);
  const [income,setIncome]=useState({});

  useEffect(()=>{
    if(!window._onAuth)return;
    const unsub=window._onAuth(u=>setUser(u));
    return()=>unsub&&unsub();
  },[]);

  useEffect(()=>{
    if(user===undefined)return;
    if(!user){setLd(false);return;}
    const uid=user.uid;
    setLd(true);
    (async()=>{
      try{
        const [d,a,sv,c,e,g,ml,tn,cu,er]=await Promise.all([
          dbLoad(uid,'dist',null),dbLoad(uid,'accs',null),dbLoad(uid,'savs',[]),
          dbLoad(uid,'cats',null),dbLoad(uid,'exps',[]),dbLoad(uid,'goals',[]),
          dbLoad(uid,'mlist',null),dbLoad(uid,'income',{}),
          dbLoad(uid,'theme','midnight'),dbLoad(uid,'currency','GBP'),dbLoad(uid,'exRate',1.17),
        ]);
        if(d&&typeof d==='object'&&!Array.isArray(d))setDist(d);
        // FIX: usar null como señal de "no guardado en DB" en vez de length>0
        // Si la DB devuelve array (incluso vacío), lo usamos. Solo usamos default si devuelve null.
        if(Array.isArray(a))setAccs(a.length>0?a:DEF_ACCS());
        else if(a===null)setAccs(DEF_ACCS()); // primera vez: usar defaults
        if(sv&&Array.isArray(sv))setSavs(sv);
        if(Array.isArray(c))setCats(c.length>0?c:DEF_CATS());
        else if(c===null)setCats(DEF_CATS());
        if(e&&Array.isArray(e))setExps(e);
        if(g&&Array.isArray(g))setGoals(g);
        if(ml&&Array.isArray(ml)&&ml.length>0)setMlist(ml);
        const incomeData=await dbLoad(uid,'income',{});if(incomeData&&typeof incomeData==='object')setIncome(incomeData);
        if(tn&&typeof tn==='string')setThemeName(tn);
        if(cu&&typeof cu==='string')setCurrency(cu);
        if(er&&typeof er==='number')setExRate(er);
      }catch(err){console.error('Load error:',err);}
      setLd(false);
    })();
  },[user]);

  useEffect(()=>{document.body.style.background=theme.bg;document.body.style.color=theme.text;},[theme]);

  const uid=user?.uid;
  const save=(key,val)=>{if(!uid)return;setSync(true);dbSave(uid,key,val).finally(()=>setTimeout(()=>setSync(false),800));};
  const uDist=v=>{setDist(v);save('dist',v)};
  const uAccs=v=>{setAccs(v);save('accs',v)};
  const uSavs=v=>{setSavs(v);save('savs',v)};
  const uCats=v=>{setCats(v);save('cats',v)};
  const uExps=v=>{setExps(v);save('exps',v)};
  const uGoals=v=>{setGoals(v);save('goals',v)};
  const uIncome=v=>{setIncome(v);save('income',v)};
  const uMlist=v=>{setMlist(v);save('mlist',v)};
  const uTheme=v=>{setThemeName(v);save('theme',v)};
  const uCurrency=v=>{setCurrency(v);save('currency',v)};
  const uExRate=v=>{setExRate(v);save('exRate',v)};
  const fmt=gbp=>currency==='EUR'?`€${((gbp||0)*exRate).toFixed(2)}`:`£${(gbp||0).toFixed(2)}`;
  const fmtN=gbp=>currency==='EUR'?(gbp||0)*exRate:(gbp||0);
  const sym=currency==='EUR'?'€':'£';
  const toGBP=val=>currency==='EUR'?val/exRate:val;
  const totBal=accs.reduce((s,a)=>s+(a.balanceGBP||0),0);
  const totSav=accs.filter(a=>a.type==='savings').reduce((s,a)=>s+(a.balanceGBP||0),0);

  if(user===undefined)return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#0f1117'}}><Spin/></div>;
  if(!user)return<Login/>;
  if(ld)return<div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14,background:theme.bg}}><Spin c={theme.accent}/><p style={{color:theme.text3,fontSize:14,margin:0}}>Cargando tus datos...</p></div>;

  const sp={theme,dist,uDist,accs,uAccs,savs,uSavs,cats,uCats,exps,uExps,goals,uGoals,mlist,uMlist,totBal,totSav,setView,fmt,fmtN,sym,toGBP,currency,uCurrency,exRate,uExRate,themeName,uTheme,income,uIncome};
  return(
    <ThemeCtx.Provider value={{theme,themeName}}>
      <div style={{minHeight:'100vh',background:theme.bg,paddingBottom:88}}>
        <div style={{position:'fixed',top:0,right:0,padding:'10px 14px',zIndex:100,display:'flex',alignItems:'center',gap:8}}>
          <span className="sd" style={{background:sync?theme.yellow:theme.green}}/>
          <span style={{fontSize:10,color:theme.text3,fontFamily:'DM Mono'}}>{sync?'guardando...':'guardado ✓'}</span>
          <button onClick={()=>window._signOut()} style={{background:'none',border:'none',color:theme.text3,cursor:'pointer',padding:'2px 4px',marginLeft:4}}><OutIc/></button>
        </div>
        <div style={{maxWidth:480,margin:'0 auto',padding:'16px 16px 0'}}>
          {view==='home'&&<HomeV {...sp}/>}
          {view==='addSaving'&&<AddSavV {...sp}/>}
          {view==='accounts'&&<AccsV {...sp}/>}
          {view==='expenses'&&<ExpsV {...sp}/>}
          {view==='stats'&&<StatsV {...sp}/>}
          {view==='goals'&&<GoalsV {...sp}/>}
          {view==='settings'&&<SettingsV {...sp}/>}
        </div>
        <BottomNav view={view} setView={setView} theme={theme}/>
        <button className="fab" onClick={()=>setShowQuick(true)} style={{background:theme.accent,color:'#fff',boxShadow:`0 4px 24px ${theme.accent}55`}}><ZapIc/></button>
        {showQuick&&<QuickExpenseModal cats={cats} exps={exps} uExps={uExps} mlist={mlist} exRate={exRate} currency={currency} theme={theme} onClose={()=>setShowQuick(false)}/>}
      </div>
    </ThemeCtx.Provider>
  );

const ExpsV=({cats,uCats,exps,uExps,mlist,uMlist,fmt,fmtN,sym,currency,exRate,theme})=>{
  const today=new Date();
  const defKey=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
  const [selKey,setSelKey]=useState(mlist.find(m=>m.key===defKey)?.key||mlist[0]?.key||'');
  const [showMon,setShowMon]=useState(false);const [showAddCat,setShowAddCat]=useState(false);
  const [newCat,setNewCat]=useState('');const [editCatId,setEditCatId]=useState(null);const [editCatName,setEditCatName]=useState('');const [editBudget,setEditBudget]=useState('');
  const [local,setLocal]=useState({});const [nmName,setNmName]=useState('');const [nmYear,setNmYear]=useState('');
  const [inputCur,setInputCur]=useState(currency);
  const COLS=['#ff6b6b','#f59e0b','#22d3a5','#6c63ff','#ec4899','#8b5cf6','#10b981','#f97316'];
  const selMon=mlist.find(m=>m.key===selKey);

  useEffect(()=>{
    if(!selKey)return;
    const map={};
    cats.forEach(c=>{const e=exps.find(x=>x.cid===c.id&&x.mk===selKey);map[c.id]=e?fmtN(e.amountGBP||0).toFixed(2):'';});
    setLocal(map);
  },[selKey,cats.length,inputCur]);

  const getAmt=cid=>{const e=exps.find(x=>x.cid===cid&&x.mk===selKey);return e?(e.amountGBP||0):0;};
  const commit=(cid,raw)=>{
    const disp=parseFloat(raw)||0;const gbp=inputCur==='EUR'?disp/exRate:disp;
    const idx=exps.findIndex(x=>x.cid===cid&&x.mk===selKey);
    let up;if(idx>=0){up=[...exps];up[idx]={...up[idx],amountGBP:gbp};}else up=[...exps,{id:Date.now(),cid,mk:selKey,amountGBP:gbp}];
    uExps(up);
  };
  const totM=cats.reduce((s,c)=>s+getAmt(c.id),0);
  const cd=cats.map((c,i)=>({name:c.name,amt:getAmt(c.id),col:COLS[i%8]})).filter(c=>c.amt>0);
  const cdTot=cd.reduce((s,c)=>s+c.amt,0);

  const addMonth=()=>{
    const y=parseInt(nmYear);if(!nmName||isNaN(y)||y<2020||y>2035)return;
    const idx=MES.indexOf(nmName);if(idx<0)return;
    const key=`${y}-${String(idx+1).padStart(2,'0')}`;if(mlist.find(m=>m.key===key))return;

    uMlist(nl);setNmName('');setNmYear('');setShowMon(false);
  };

  const Donut=()=>{

      <text x={cx} y={cy-4} textAnchor="middle" fill={theme.text} fontSize="12" fontWeight="700" fontFamily="DM Mono">{sym}{fmtN(cdTot).toFixed(0)}</text>

    </svg>);
  };

  return(
    <div style={{paddingTop:8,display:'flex',flexDirection:'column',gap:14}}>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <h2 style={{margin:0,fontSize:22,fontWeight:700,color:theme.text}}>Gastos</h2>
        <div style={{display:'flex',gap:8}}>
          <Sel value={inputCur} onChange={e=>setInputCur(e.target.value)} style={{width:82,padding:'8px 10px',fontSize:12}}><option value="GBP">£ GBP</option><option value="EUR">€ EUR</option></Sel>
          <button onClick={()=>setShowAddCat(true)} style={{background:theme.accent2,color:theme.tagText||theme.accent,border:'none',borderRadius:10,padding:'8px 12px',fontSize:13,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:4}}><PlusIc/></button>
        </div>
      </div>

      {/* Add category inline */}
      {showAddCat&&(
        <Card style={{padding:14,display:'flex',gap:8}}>
          <Inp type="text" placeholder="Nueva categoría..." value={newCat} onChange={e=>setNewCat(e.target.value)} autoFocus style={{flex:1}} onKeyDown={e=>{if(e.key==='Enter'&&newCat.trim()){uCats([...cats,{id:Date.now(),name:newCat.trim(),def:0}]);setNewCat('');setShowAddCat(false)}}}/>
          <button onClick={()=>{if(newCat.trim()){uCats([...cats,{id:Date.now(),name:newCat.trim(),def:0}]);setNewCat('');setShowAddCat(false)}}} style={{background:theme.accent,color:'#fff',border:'none',borderRadius:10,padding:'0 16px',cursor:'pointer',fontWeight:600}}>+</button>
          <button onClick={()=>setShowAddCat(false)} style={{background:theme.bg3,border:`1px solid ${theme.border}`,color:theme.text3,borderRadius:10,padding:'0 12px',cursor:'pointer',fontSize:13}}>✕</button>
        </Card>
      )}

      {/* Month selector */}
      <Card style={{padding:'12px 16px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <p style={{margin:0,fontSize:11,color:theme.text3,fontWeight:500,textTransform:'uppercase',letterSpacing:.5}}>Mes</p>
          <button onClick={()=>setShowMon(!showMon)} style={{background:'none',border:'none',color:theme.accent,fontSize:11,fontWeight:600,cursor:'pointer',padding:0}}>+ Añadir mes</button>
        </div>
        {showMon&&(
          <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap'}}>
            <Sel value={nmName} onChange={e=>setNmName(e.target.value)} style={{flex:1,minWidth:120,padding:'7px 10px',fontSize:13}}><option value="">Mes</option>{MES.map(m=><option key={m} value={m}>{m}</option>)}</Sel>
            <Inp type="number" inputMode="numeric" placeholder="Año" value={nmYear} onChange={e=>setNmYear(e.target.value)} style={{width:76,padding:'7px 10px',fontSize:13}}/>
            <button onClick={addMonth} style={{background:theme.accent,color:'#fff',border:'none',borderRadius:10,padding:'0 14px',cursor:'pointer',fontWeight:700,fontSize:15}}>+</button>
          </div>
        )}
        <div className="msc">
          {mlist.map(m=>(<button key={m.key} className="mc" style={{background:selKey===m.key?theme.accent:theme.bg3,borderColor:selKey===m.key?theme.accent:theme.border,color:selKey===m.key?'#fff':theme.text3}} onClick={()=>setSelKey(m.key)}>{m.label}</button>))}
        </div>
      </Card>

      {/* Donut + total */}
      {selMon&&cdTot>0&&(
        <Card style={{padding:16}}>
          <div style={{display:'flex',alignItems:'center',gap:16}}>
            <Donut/>
            <div style={{display:'flex',flexDirection:'column',gap:6,flex:1}}>
              {cd.map((d,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:8}}>
                  <div style={{width:8,height:8,borderRadius:2,background:d.col,flexShrink:0}}/>
                  <span style={{fontSize:12,color:theme.text2,flex:1}}>{d.name}</span>
                  <span style={{fontSize:12,fontFamily:'DM Mono',color:theme.text,fontWeight:500}}>{sym}{fmtN(d.amt).toFixed(0)}</span>
                  <span style={{fontSize:10,color:theme.text3,width:28,textAlign:'right'}}>{cdTot>0?((d.amt/cdTot)*100).toFixed(0):0}%</span>
                </div>
              ))}
            </div>
          </div>
        </Card>
      )}

      {/* Unified category list */}
      {selMon&&(
        <Card style={{padding:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <h3 style={{margin:0,fontSize:14,fontWeight:600,color:theme.text}}>{selMon.label}</h3>
            <span style={{fontFamily:'DM Mono',fontSize:13,color:theme.red,fontWeight:600}}>{fmt(totM)}</span>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {cats.map((cat,i)=>(
              <div key={cat.id} style={{background:theme.bg3,border:`1px solid ${theme.border}`,borderRadius:12,padding:'10px 12px'}}>
                {editCatId===cat.id?(
                  /* Editing category name + budget */
                  <div style={{display:'flex',flexDirection:'column',gap:8}}>
                    <div style={{display:'flex',gap:8,alignItems:'center'}}>
                      <Inp type="text" value={editCatName} onChange={e=>setEditCatName(e.target.value)} autoFocus style={{flex:1,padding:'6px 10px',fontSize:13}} placeholder="Nombre" onKeyDown={e=>{if(e.key==='Enter'&&editCatName.trim()){const v=parseFloat(editBudget)||0;const gbp=inputCur==='EUR'?v/exRate:v;uCats(cats.map(c=>c.id===cat.id?{...c,name:editCatName.trim(),budgetGBP:gbp||null}:c));setEditCatId(null)}}}/>
                      <button onClick={()=>{if(editCatName.trim()){const v=parseFloat(editBudget)||0;const gbp=inputCur==='EUR'?v/exRate:v;uCats(cats.map(c=>c.id===cat.id?{...c,name:editCatName.trim(),budgetGBP:gbp||null}:c));setEditCatId(null)}}} style={{background:theme.accent,color:'#fff',border:'none',borderRadius:8,padding:'6px 12px',cursor:'pointer',fontWeight:600,fontSize:13}}>OK</button>
                      <button onClick={()=>setEditCatId(null)} style={{background:'none',border:'none',color:theme.text3,cursor:'pointer',fontSize:18,padding:'0 4px'}}>✕</button>
                    </div>
                    <div style={{display:'flex',gap:8,alignItems:'center'}}>
                      <span style={{fontSize:11,color:theme.text3,whiteSpace:'nowrap'}}>Presup. {inputCur==='EUR'?'€':'£'}</span>
                      <Inp type="number" inputMode="decimal" value={editBudget} onChange={e=>setEditBudget(e.target.value)} placeholder="Sense límit" style={{flex:1,padding:'6px 10px',fontSize:13}}/>
                    </div>
                  </div>
                ):(
                  /* Normal row */
                  <div>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:cat.budgetGBP?5:0}}>
                      <div style={{width:8,height:8,borderRadius:2,background:COLS[i%8],flexShrink:0}}/>
                      <span style={{fontSize:13,color:theme.text2,flex:1,fontWeight:500}}>{cat.name}</span>
                      {cat.budgetGBP&&<span style={{fontSize:10,color:theme.text3,fontFamily:'DM Mono'}}>{sym}{fmtN(getAmt(cat.id)).toFixed(0)}/{sym}{fmtN(cat.budgetGBP).toFixed(0)}</span>}
                      <span style={{color:theme.text3,fontSize:12,marginRight:2}}>{inputCur==='EUR'?'€':'£'}</span>
                      <Inp
                        type="number" inputMode="decimal"
                        value={local[cat.id]??''}
                        onChange={e=>setLocal(p=>({...p,[cat.id]:e.target.value}))}
                        onBlur={e=>commit(cat.id,e.target.value)}
                        onKeyDown={e=>{if(e.key==='Enter'){commit(cat.id,local[cat.id]??'');e.target.blur()}}}
                        placeholder="0"
                        style={{width:76,textAlign:'right',padding:'6px 8px',fontSize:13}}
                      />
                      <button onClick={()=>{setEditCatId(cat.id);setEditCatName(cat.name);setEditBudget(cat.budgetGBP?(inputCur==='EUR'?fmtN(cat.budgetGBP).toFixed(2):cat.budgetGBP.toFixed(2)):'')}} style={{background:'none',border:'none',color:theme.text3,cursor:'pointer',padding:'0 2px',opacity:.7}}><EditIc/></button>
                      <button onClick={()=>{if(confirm('¿Eliminar?')){uCats(cats.filter(c=>c.id!==cat.id));uExps(exps.filter(e=>e.cid!==cat.id))}}} style={{background:'none',border:'none',color:theme.red,cursor:'pointer',padding:'0 2px',opacity:.5}}><DelIc/></button>
                    </div>
                    {cat.budgetGBP&&(()=>{const spent=getAmt(cat.id);const pct=Math.min(spent/cat.budgetGBP*100,100);const col=pct>90?theme.red:pct>70?theme.yellow:COLS[i%8];return(<div style={{height:4,background:theme.border,borderRadius:2,overflow:'hidden'}}><div style={{height:'100%',width:`${pct}%`,background:col,borderRadius:2,transition:'width .4s'}}/></div>);})()}
                  </div>
                )}
              </div>
            ))}
          </div>
        </Card>
      )}

};

const StatsV=({cats,exps,totSav,mlist,fmt,fmtN,sym,theme})=>{
  const COLS=['#ff6b6b','#f59e0b','#22d3a5','#6c63ff','#ec4899','#8b5cf6','#10b981','#f97316'];
  const ct=cats.map(c=>({name:c.name,amt:exps.filter(e=>e.cid===c.id).reduce((s,e)=>s+(e.amountGBP||0),0)})).filter(c=>c.amt>0);
  const tE=ct.reduce((s,c)=>s+c.amt,0);
  const mt=mlist.map(m=>({label:m.label.slice(0,6),key:m.key,tot:cats.reduce((s,c)=>{const e=exps.find(x=>x.cid===c.id&&x.mk===m.key);return s+(e?(e.amountGBP||0):0);},0)})).filter(m=>m.tot>0).slice(-8);
  const mx=Math.max(...mt.map(m=>m.tot),1);
  // Current month vs previous
  const today=new Date();
  const curMk=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
  const prevDate=new Date(today.getFullYear(),today.getMonth()-1,1);
  const prevMk=`${prevDate.getFullYear()}-${String(prevDate.getMonth()+1).padStart(2,'0')}`;
  const totCur=cats.reduce((s,c)=>{const e=exps.find(x=>x.cid===c.id&&x.mk===curMk);return s+(e?(e.amountGBP||0):0);},0);
  const totPrev=cats.reduce((s,c)=>{const e=exps.find(x=>x.cid===c.id&&x.mk===prevMk);return s+(e?(e.amountGBP||0):0);},0);
  const diff=totCur-totPrev;const diffPct=totPrev>0?(diff/totPrev*100):0;
  // Per cat comparison
  const catComp=cats.map(c=>{
    const cur=exps.find(x=>x.cid===c.id&&x.mk===curMk);const prev=exps.find(x=>x.cid===c.id&&x.mk===prevMk);
    const cA=cur?(cur.amountGBP||0):0;const pA=prev?(prev.amountGBP||0):0;
    return{name:c.name,cur:cA,prev:pA,diff:cA-pA};
  }).filter(c=>c.cur>0||c.prev>0);
  const LineChart=()=>{
    if(mt.length<2)return null;
    const W=320,H=90,pad=10;
    const xs=mt.map((_,i)=>pad+(i/(mt.length-1))*(W-pad*2));
    const ys=mt.map(m=>H-pad-(m.tot/mx)*(H-pad*2));
    const pts=xs.map((x,i)=>`${x},${ys[i]}`).join(' ');
    return(<svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:'block',overflow:'visible'}}>
      <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={theme.accent} stopOpacity="0.3"/><stop offset="100%" stopColor={theme.accent} stopOpacity="0"/></linearGradient></defs>
      <polygon points={`${xs[0]},${H} ${pts} ${xs[xs.length-1]},${H}`} fill="url(#lg)"/>
      <polyline points={pts} fill="none" stroke={theme.accent} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
      {xs.map((x,i)=>(<g key={i}><circle cx={x} cy={ys[i]} r={4} fill={theme.accent} stroke={theme.bg2} strokeWidth={2}/><text x={x} y={H} textAnchor="middle" fill={theme.text3} fontSize="8">{mt[i].label}</text><text x={x} y={ys[i]-10} textAnchor="middle" fill={theme.text2} fontSize="8" fontFamily="DM Mono">{sym}{fmtN(mt[i].tot).toFixed(0)}</text></g>))}
    </svg>);
  };
  return(
    <div style={{paddingTop:8,display:'flex',flexDirection:'column',gap:14}}>
      <h2 style={{margin:0,fontSize:22,fontWeight:700,color:theme.text}}>Estadísticas</h2>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <Card style={{padding:16}}><p style={{margin:'0 0 4px',fontSize:11,color:theme.text3,textTransform:'uppercase',letterSpacing:.5}}>Gastos acum.</p><p style={{margin:0,fontSize:22,fontWeight:700,fontFamily:'DM Mono',color:theme.red}}>{sym}{fmtN(tE).toFixed(0)}</p></Card>
        <Card style={{padding:16}}><p style={{margin:'0 0 4px',fontSize:11,color:theme.text3,textTransform:'uppercase',letterSpacing:.5}}>En ahorro</p><p style={{margin:0,fontSize:22,fontWeight:700,fontFamily:'DM Mono',color:theme.green}}>{sym}{fmtN(totSav).toFixed(0)}</p></Card>
      </div>
      {(totCur>0||totPrev>0)&&(<Card style={{padding:20}}>
        <h3 style={{margin:'0 0 14px',fontSize:15,fontWeight:600,color:theme.text}}>Aquest mes vs anterior</h3>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:14}}>
          <div><p style={{margin:'0 0 2px',fontSize:11,color:theme.text3}}>Mes anterior</p><p style={{margin:0,fontSize:20,fontWeight:700,fontFamily:'DM Mono',color:theme.text2}}>{sym}{fmtN(totPrev).toFixed(0)}</p></div>
          <div style={{textAlign:'center',padding:'6px 14px',borderRadius:10,background:diff<=0?`${theme.green}15`:`${theme.red}15`}}>
            <p style={{margin:0,fontSize:13,fontFamily:'DM Mono',fontWeight:700,color:diff<=0?theme.green:theme.red}}>{diff<=0?'▼':'▲'} {sym}{Math.abs(fmtN(diff)).toFixed(0)}</p>
            <p style={{margin:0,fontSize:10,color:theme.text3}}>{diff<=0?'menys':'més'} ({Math.abs(diffPct).toFixed(0)}%)</p>
          </div>
          <div style={{textAlign:'right'}}><p style={{margin:'0 0 2px',fontSize:11,color:theme.text3}}>Aquest mes</p><p style={{margin:0,fontSize:20,fontWeight:700,fontFamily:'DM Mono',color:theme.text}}>{sym}{fmtN(totCur).toFixed(0)}</p></div>
        </div>
        {catComp.length>0&&(<div style={{display:'flex',flexDirection:'column',gap:6}}>
          {catComp.sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff)).map((c,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:12,color:theme.text2,flex:1}}>{c.name}</span>
              <span style={{fontSize:11,fontFamily:'DM Mono',color:theme.text3}}>{sym}{fmtN(c.prev).toFixed(0)}</span>
              <span style={{fontSize:10,color:theme.text3}}>→</span>
              <span style={{fontSize:11,fontFamily:'DM Mono',color:theme.text,fontWeight:600}}>{sym}{fmtN(c.cur).toFixed(0)}</span>
              {c.diff!==0&&<span style={{fontSize:10,fontFamily:'DM Mono',color:c.diff>0?theme.red:theme.green,minWidth:36,textAlign:'right'}}>{c.diff>0?'+':''}{sym}{fmtN(Math.abs(c.diff)).toFixed(0)}</span>}
            </div>
          ))}
        </div>)}
      </Card>)}
        {mt.length>=2&&(<Card style={{padding:20}}><h3 style={{margin:'0 0 16px',fontSize:15,fontWeight:600,color:theme.text}}>Evolución de Gastos</h3><div style={{paddingBottom:14,paddingTop:10}}><LineChart/></div></Card>)}
      {ct.length>0&&(<Card style={{padding:20}}><h3 style={{margin:'0 0 14px',fontSize:15,fontWeight:600,color:theme.text}}>Por Categoría</h3><div style={{height:8,borderRadius:4,overflow:'hidden',display:'flex',marginBottom:14}}>{ct.map((c,i)=><div key={i} style={{flex:c.amt,background:COLS[i%8]}}/>)}</div>{[...ct].sort((a,b)=>b.amt-a.amt).map((c,i)=>(<div key={i} style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}><div style={{width:10,height:10,borderRadius:3,background:COLS[i%8],flexShrink:0}}/><span style={{fontSize:13,color:theme.text2,flex:1}}>{c.name}</span><span style={{fontSize:13,fontFamily:'DM Mono',color:theme.text,fontWeight:500}}>{sym}{fmtN(c.amt).toFixed(0)}</span><span style={{fontSize:11,color:theme.text3,fontFamily:'DM Mono',width:34,textAlign:'right'}}>{tE>0?((c.amt/tE)*100).toFixed(0):0}%</span></div>))}</Card>)}
    </div>
  );
};

      {goals.length===0&&!showAdd&&(<Card style={{padding:40,textAlign:'center'}}><p style={{fontSize:36,margin:'0 0 8px'}}>🎯</p><p style={{color:theme.text3,fontSize:14,margin:0}}>Sin metas aún. ¡Añade una!</p></Card>)}
      {goals.map(g=>{
        const pct=Math.min((g.saved/g.target)*100,100);const rem=g.target-g.saved;const isEdit=editing===g.id;
        return(<Card key={g.id} style={{padding:20}}>
          {isEdit?(
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              <Inp type="text" value={g.name} onChange={e=>uGoals(goals.map(x=>x.id===g.id?{...x,name:e.target.value}:x))}/>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div><label style={{fontSize:11,color:theme.text3,display:'block',marginBottom:4}}>Objetivo</label><Inp type="number" inputMode="decimal" value={g.target} onChange={e=>uGoals(goals.map(x=>x.id===g.id?{...x,target:parseFloat(e.target.value)||0}:x))}/></div>
                <div><label style={{fontSize:11,color:theme.text3,display:'block',marginBottom:4}}>Ahorrado</label><Inp type="number" inputMode="decimal" value={g.saved} onChange={e=>uGoals(goals.map(x=>x.id===g.id?{...x,saved:parseFloat(e.target.value)||0}:x))}/></div>
              </div>
              <Sel value={g.bank} onChange={e=>uGoals(goals.map(x=>x.id===g.id?{...x,bank:e.target.value}:x))}><option value="">Sin asignar</option>{accs.map(a=><option key={a.id} value={a.name}>{a.name}</option>)}<option value="Efectivo">💵 Efectivo</option></Sel>
              <div style={{display:'flex',gap:10}}><Btn onClick={()=>setEditing(null)}>Listo</Btn><button onClick={()=>{if(confirm('¿Eliminar?')){uGoals(goals.filter(x=>x.id!==g.id));setEditing(null)}}} style={{background:'none',border:`1px solid ${theme.red}`,color:theme.red,borderRadius:10,padding:'12px',cursor:'pointer',flex:1,fontWeight:600}}>Eliminar</button></div>
            </div>
          ):(
            <>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>
                <div style={{display:'flex',alignItems:'center',gap:12}}>
                  <div style={{width:48,height:48,borderRadius:14,background:`${g.color}20`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,border:`1px solid ${g.color}30`}}>{g.emoji}</div>
                  <div><p style={{margin:0,fontWeight:600,fontSize:16,color:theme.text}}>{g.name}</p>{g.bank&&<p style={{margin:'2px 0 0',fontSize:12,color:theme.text3}}>🏦 {g.bank}</p>}</div>
                </div>
                <button onClick={()=>setEditing(g.id)} style={{background:'none',border:'none',color:theme.text3,cursor:'pointer'}}><EditIc/></button>
              </div>
              <div style={{marginBottom:14}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}><span style={{fontSize:12,color:theme.text3}}>Progreso</span><span style={{fontSize:12,fontFamily:'DM Mono',color:g.color,fontWeight:600}}>{pct.toFixed(1)}%</span></div>
                <div style={{height:10,background:theme.bg3,borderRadius:5,overflow:'hidden',border:`1px solid ${theme.border}`}}><div style={{height:'100%',background:g.color,width:`${pct}%`,borderRadius:5,transition:'width .6s'}}/></div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:14}}>
                {[['Objetivo',g.target,theme.text],['Ahorrado',g.saved,g.color],['Restante',rem,theme.red]].map(([l,v,c])=>(<CL key={l} style={{padding:'10px 12px',textAlign:'center'}}><p style={{margin:'0 0 3px',fontSize:10,color:theme.text3}}>{l}</p><p style={{margin:0,fontSize:14,fontWeight:700,fontFamily:'DM Mono',color:c}}>{fmt(v)}</p></CL>))}
              </div>
              <div style={{borderTop:`1px solid ${theme.border}`,paddingTop:12,display:'flex',gap:8}}>
                <Inp type="number" inputMode="decimal" placeholder={`Pago (${sym})`} value={payAmts[g.id]||''} onChange={e=>setPayAmts(p=>({...p,[g.id]:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&addPayment(g)}/>
                <Btn onClick={()=>addPayment(g)} style={{width:'auto',padding:'10px 16px',whiteSpace:'nowrap'}}>+ Añadir</Btn>
              </div>
            </>
          )}
        </Card>);
      })}
    </div>
  );
};

const SettingsV=({themeName,uTheme,currency,uCurrency,exRate,uExRate,theme})=>{
  const [tmpRate,setTmpRate]=useState(exRate.toString());
  return(
    <div style={{paddingTop:8,display:'flex',flexDirection:'column',gap:16}}>
      <h2 style={{margin:0,fontSize:22,fontWeight:700,color:theme.text}}>Ajustes</h2>
      <Card style={{padding:20}}>
        <h3 style={{margin:'0 0 14px',fontSize:15,fontWeight:600,color:theme.text}}>💱 Divisa</h3>
        <div style={{display:'flex',gap:10,marginBottom:14}}>{['GBP','EUR'].map(c=>(<button key={c} onClick={()=>uCurrency(c)} style={{flex:1,padding:'12px',border:`2px solid ${currency===c?theme.accent:theme.border}`,borderRadius:12,background:currency===c?theme.accent2:theme.bg3,color:currency===c?theme.accent:theme.text3,cursor:'pointer',fontWeight:700,fontSize:18,transition:'all .2s'}}>{c==='GBP'?'£ GBP':'€ EUR'}</button>))}</div>
        <div>
          <label style={{fontSize:11,color:theme.text3,display:'block',marginBottom:6,fontWeight:500,textTransform:'uppercase',letterSpacing:.5}}>Tipo de cambio (1£ = X€)</label>
          <div style={{display:'flex',gap:10}}><Inp type="number" inputMode="decimal" value={tmpRate} onChange={e=>setTmpRate(e.target.value)} placeholder="1.17"/><Btn onClick={()=>{const v=parseFloat(tmpRate);if(v>0)uExRate(v)}} style={{width:'auto',padding:'10px 16px'}}>Aplicar</Btn></div>
          <p style={{margin:'8px 0 0',fontSize:12,color:theme.text3}}>1£ = {exRate}€ · 1€ = £{(1/exRate).toFixed(4)}</p>
        </div>
      </Card>
      <Card style={{padding:20}}>
        <h3 style={{margin:'0 0 14px',fontSize:15,fontWeight:600,color:theme.text}}>🎨 Tema de color</h3>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {Object.entries(THEMES).map(([key,t])=>(<button key={key} onClick={()=>uTheme(key)} style={{display:'flex',alignItems:'center',gap:14,padding:'14px 16px',border:`2px solid ${themeName===key?t.accent:theme.border}`,borderRadius:14,background:themeName===key?t.accent2:theme.bg3,cursor:'pointer',transition:'all .2s',textAlign:'left'}}>
            <span style={{fontSize:24}}>{t.emoji}</span>
            <div style={{flex:1}}><p style={{margin:0,fontWeight:600,fontSize:14,color:theme.text}}>{t.name}</p><div style={{display:'flex',gap:4,marginTop:5}}>{[t.accent,t.green,t.red,t.yellow,t.bg2].map((c,i)=><div key={i} style={{width:16,height:16,borderRadius:4,background:c}}/>)}</div></div>
            {themeName===key&&<div style={{width:20,height:20,borderRadius:'50%',background:t.accent,display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{color:'#fff',fontSize:12}}>✓</span></div>}
          </button>))}
        </div>
      </Card>
      <Card style={{padding:20}}>
        <h3 style={{margin:'0 0 12px',fontSize:15,fontWeight:600,color:theme.text}}>👤 Cuenta</h3>
        <p style={{margin:'0 0 14px',fontSize:13,color:theme.text3}}>Tus datos son privados y solo tú puedes verlos.</p>
        <button onClick={()=>window._signOut()} style={{width:'100%',padding:'12px',border:`1px solid ${theme.red}40`,borderRadius:10,background:`${theme.red}10`,color:theme.red,cursor:'pointer',fontWeight:600,fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}><OutIc/>Cerrar sesión</button>
      </Card>
    </div>
  );
};

const BottomNav=({view,setView,theme})=>{
  const tabs=[{id:'home',label:'Inicio',icon:<HomeIc/>},{id:'accounts',label:'Cuentas',icon:<WalIc/>},{id:'expenses',label:'Gastos',icon:<TrIc/>},{id:'goals',label:'Metas',icon:<TgIc/>},{id:'settings',label:'Ajustes',icon:<SetIc/>}];
  const on=id=>view===id||(id==='home'&&view==='addSaving')||(id==='watchlist'&&view==='watchlist');
  return(<div style={{position:'fixed',bottom:0,left:0,right:0,background:theme.navBg,backdropFilter:'blur(20px)',borderTop:`1px solid ${theme.border}`,padding:'6px 2px',zIndex:100}}>
    <div style={{display:'flex',justifyContent:'space-around',maxWidth:480,margin:'0 auto'}}>
      {tabs.map(t=>(<button key={t.id} onClick={()=>setView(t.id)} className="nb" style={{color:on(t.id)?theme.accent:theme.text3}}>{t.icon}<span>{t.label}</span></button>))}
    </div>
  </div>);
};

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
