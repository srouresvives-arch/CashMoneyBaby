<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Finanzas">
  <title>Gestor Financiero Personal</title>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    const cfg = {
      apiKey:"AIzaSyALBFWmnSTsPlYi8TA_6Q_CvUzu-5kOkaY",
      authDomain:"myfin-mk2.firebaseapp.com",
      projectId:"myfin-mk2",
      storageBucket:"myfin-mk2.firebasestorage.app",
      messagingSenderId:"371858436203",
      appId:"1:371858436203:web:8073719516fd9fa3a8012e"
    };
    const app = initializeApp(cfg);
    const db  = getFirestore(app);
    const auth= getAuth(app);
    db._doc=doc; db._getDoc=getDoc; db._setDoc=setDoc;
    window._db=db; window._auth=auth;
    window._signIn =(e,p)=>signInWithEmailAndPassword(auth,e,p);
    window._signOut=()=>signOut(auth);
    window._onAuth =(cb)=>onAuthStateChanged(auth,cb);
    window._fsReady=true;
    window.dispatchEvent(new Event("fsReady"));
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;padding:0;font-family:'DM Sans',-apple-system,sans-serif;background:#0f1117;color:#f0f0f0;overscroll-behavior:none}
    input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
    input[type=number]{-moz-appearance:textfield}
    .card{background:#1a1d27;border:1px solid #2a2d3a;border-radius:16px}
    .cl{background:#1e2130;border:1px solid #2a2d3a;border-radius:12px}
    .inp{background:#0f1117;border:1px solid #2a2d3a;color:#f0f0f0;border-radius:10px;padding:10px 14px;width:100%;font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color .2s}
    .inp:focus{border-color:#6c63ff}
    .bp{background:#6c63ff;color:#fff;border:none;border-radius:10px;padding:12px 20px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:15px;cursor:pointer;width:100%;transition:opacity .2s}
    .bp:active{opacity:.8}
    .bs{background:#2a2d3a;color:#f0f0f0;border:none;border-radius:10px;padding:12px 20px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:15px;cursor:pointer;width:100%}
    .nb{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 10px;border-radius:12px;border:none;background:transparent;color:#666;cursor:pointer;transition:all .2s}
    .nb.on{color:#6c63ff;background:rgba(108,99,255,.12)}
    .nb span{font-size:10px;font-weight:600;font-family:'DM Sans',sans-serif}
    .tag{background:rgba(108,99,255,.15);color:#6c63ff;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
    .tg{background:rgba(34,211,165,.12);color:#22d3a5;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
    .tr{background:rgba(255,107,107,.12);color:#ff6b6b;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
    .sd{width:8px;height:8px;border-radius:50%;display:inline-block;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
    .sh{background:linear-gradient(90deg,#1a1d27 25%,#2a2d3a 50%,#1a1d27 75%);background-size:200% 100%;animation:sh 1.5s infinite;border-radius:8px}
    @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .msc{display:flex;overflow-x:auto;gap:10px;padding:4px 2px 8px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .msc::-webkit-scrollbar{display:none}
    .mc{scroll-snap-align:start;flex-shrink:0;padding:8px 16px;border-radius:20px;border:1px solid #2a2d3a;background:#1a1d27;color:#888;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s}
    .mc.on{background:#6c63ff;border-color:#6c63ff;color:#fff}
    select option{background:#1a1d27;color:#f0f0f0}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

const MONTHS_ES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

const DEF_ACCOUNTS=[
  {id:1,name:'Santander',      type:'current',   balance:216},
  {id:2,name:'Revolut Ahorro', type:'savings',   balance:288},
  {id:3,name:'Revolut Inversión',type:'investment',balance:72},
  {id:4,name:'Chase Gastos',   type:'current',   balance:0},
  {id:5,name:'Imagin (Mamá)',  type:'current',   balance:144},
];
const DEF_DIST={
  madre:    {percentage:20,label:'A tu madre (Imagin)'},
  inversion:{percentage:10,label:'Inversión ETF (Revolut)'},
  ahorro:   {percentage:40,label:'Ahorro intocable (Revolut)'},
  caprichos:{percentage:30,label:'Caprichos/Emergencias (Santander)'},
};
const DEF_CATS=[
  {id:1,name:'Renta',        def:525},
  {id:2,name:'WiFi',         def:12},
  {id:3,name:'Gimnasio',     def:29},
  {id:4,name:'Electricidad', def:50},
  {id:5,name:'Agua',         def:30},
  {id:6,name:'Gasolina',     def:60},
  {id:7,name:'Council Tax',  def:124},
  {id:8,name:'Víveres',      def:180},
];
const DEF_DEBT={total:3663.99,paid:423.93};

const genMonths=()=>{
  const list=[];
  for(let y=2026;y<=2028;y++){
    const s=y===2026?1:0;
    for(let m=s;m<12;m++)
      list.push({key:`${y}-${String(m+1).padStart(2,'0')}`,label:`${MONTHS_ES[m]} ${y}`,month:MONTHS_ES[m],year:y});
  }
  return list;
};

// Firebase helpers
const waitFS=()=>new Promise(r=>{if(window._fsReady)return r();window.addEventListener('fsReady',r,{once:true});setTimeout(r,6000)});
const load=async(key,fb)=>{try{await waitFS();const db=window._db;if(!db)return fb;const s=await db._getDoc(db._doc(db,'finanzas',key));return s.exists()?s.data().value:fb;}catch{return fb}};
const save=async(key,val)=>{try{await waitFS();const db=window._db;if(!db)return;await db._setDoc(db._doc(db,'finanzas',key),{value:val});}catch(e){console.error(e)}};

// Icons
const Ic=({d,s=22,w=2})=><svg width={s} height={s} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={w} d={d}/></svg>;
const HomeIc  =()=><Ic d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>;
const WalIc   =()=><Ic d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/>;
const TrIc    =()=><Ic d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>;
const ChIc    =()=><Ic d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>;
const TgIc    =()=><Ic d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>;
const InvIc   =()=><Ic d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"/>;
const PlusIc  =()=><Ic d="M12 4v16m8-8H4" s={18}/>;
const EditIc  =()=><Ic d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" s={16}/>;
const DelIc   =()=><Ic d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" s={16}/>;
const StarIc  =()=><Ic d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" s={14}/>;
const RefIc   =()=><Ic d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" s={16}/>;
const LockIc  =()=><Ic d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>;
const OutIc   =()=><Ic d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" s={18}/>;

// Spinner
const Spin=({s=40,c='#6c63ff'})=><div style={{width:s,height:s,border:`3px solid #2a2d3a`,borderTop:`3px solid ${c}`,borderRadius:'50%',animation:'spin 1s linear infinite'}}/>;

// ── LOGIN ─────────────────────────────────────────────────────────────────────
const Login=()=>{
  const [em,setEm]=useState('');
  const [pw,setPw]=useState('');
  const [err,setErr]=useState('');
  const [ld,setLd]=useState(false);
  const go=async()=>{
    if(!em||!pw)return setErr('Introduce email y contraseña');
    setLd(true);setErr('');
    try{await window._signIn(em,pw);}
    catch{setErr('Email o contraseña incorrectos');}
    setLd(false);
  };
  return(
    <div style={{minHeight:'100vh',background:'#0f1117',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{width:'100%',maxWidth:340}}>
        <div style={{textAlign:'center',marginBottom:36}}>
          <div style={{width:60,height:60,background:'rgba(108,99,255,.12)',borderRadius:18,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px',border:'1px solid rgba(108,99,255,.25)'}}>
            <LockIc/>
          </div>
          <h1 style={{margin:'0 0 4px',fontSize:24,fontWeight:700}}>Mis Finanzas</h1>
          <p style={{margin:0,fontSize:13,color:'#555'}}>Acceso privado</p>
        </div>
        <div className="card" style={{padding:22,display:'flex',flexDirection:'column',gap:13}}>
          <div>
            <label style={{fontSize:11,color:'#555',display:'block',marginBottom:5,fontWeight:500,textTransform:'uppercase',letterSpacing:.5}}>Email</label>
            <input type="email" value={em} onChange={e=>setEm(e.target.value)} placeholder="tu@email.com" className="inp" onKeyDown={e=>e.key==='Enter'&&go()}/>
          </div>
          <div>
            <label style={{fontSize:11,color:'#555',display:'block',marginBottom:5,fontWeight:500,textTransform:'uppercase',letterSpacing:.5}}>Contraseña</label>
            <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••" className="inp" onKeyDown={e=>e.key==='Enter'&&go()}/>
          </div>
          {err&&<p style={{margin:0,fontSize:13,color:'#ff6b6b',textAlign:'center'}}>{err}</p>}
          <button onClick={go} className="bp" style={{marginTop:4,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
            {ld?<Spin s={18} c='#fff'/>:'Entrar'}
          </button>
        </div>
        <p style={{textAlign:'center',fontSize:11,color:'#2a2d3a',marginTop:16}}>Crea tu usuario en Firebase → Authentication</p>
      </div>
    </div>
  );
};

// ── APP SHELL ─────────────────────────────────────────────────────────────────
const App=()=>{
  const [user,setUser]=useState(undefined);
  const [view,setView]=useState('home');
  const [ld,setLd]=useState(true);
  const [sync,setSync]=useState(false);

  const [dist,setDist]     =useState(DEF_DIST);
  const [accs,setAccs]     =useState(DEF_ACCOUNTS);
  const [savs,setSavs]     =useState([]);
  const [cats,setCats]     =useState(DEF_CATS);
  const [exps,setExps]     =useState([]);
  const [debt,setDebt]     =useState(DEF_DEBT);
  const [invs,setInvs]     =useState([]);
  const [mlist,setMlist]   =useState(genMonths());

  useEffect(()=>{const u=window._onAuth&&window._onAuth(u=>setUser(u));return()=>u&&u();},[]);

  useEffect(()=>{
    if(!user)return;
    (async()=>{
      setLd(true);
      const [d,a,sv,c,e,db,iv,ml]=await Promise.all([
        load('dist',null),load('accs',null),load('savs',[]),load('cats',null),
        load('exps',[]),load('debt',null),load('invs',[]),load('mlist',null)
      ]);
      if(d)setDist(d);if(a)setAccs(a);if(sv)setSavs(sv);if(c)setCats(c);
      if(e)setExps(e);if(db)setDebt(db);if(iv)setInvs(iv);if(ml)setMlist(ml);
      setLd(false);
    })();
  },[user]);

  const sy=(k,v)=>{setSync(true);save(k,v);setTimeout(()=>setSync(false),900)};
  const uDist=v=>{setDist(v);sy('dist',v)};
  const uAccs=v=>{setAccs(v);sy('accs',v)};
  const uSavs=v=>{setSavs(v);sy('savs',v)};
  const uCats=v=>{setCats(v);sy('cats',v)};
  const uExps=v=>{setExps(v);sy('exps',v)};
  const uDebt=v=>{setDebt(v);sy('debt',v)};
  const uInvs=v=>{setInvs(v);sy('invs',v)};
  const uMlist=v=>{setMlist(v);sy('mlist',v)};

  const totBal =accs.reduce((s,a)=>s+a.balance,0);
  const totSav =accs.filter(a=>a.type==='savings').reduce((s,a)=>s+a.balance,0);
  const remDebt=debt.total-debt.paid;

  if(user===undefined)return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#0f1117'}}><Spin/></div>;
  if(!user)return<Login/>;
  if(ld)return<div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14,background:'#0f1117'}}><Spin/><p style={{color:'#555',fontSize:14,margin:0}}>Cargando...</p></div>;

  const sp={dist,uDist,accs,uAccs,savs,uSavs,cats,uCats,exps,uExps,debt,uDebt,invs,uInvs,mlist,uMlist,totBal,totSav,remDebt,setView};

  return(
    <div style={{minHeight:'100vh',background:'#0f1117',paddingBottom:88}}>
      <div style={{position:'fixed',top:0,right:0,padding:'10px 14px',zIndex:100,display:'flex',alignItems:'center',gap:8}}>
        <span className="sd" style={{background:sync?'#f59e0b':'#22d3a5'}}/>
        <span style={{fontSize:10,color:'#333',fontFamily:'DM Mono'}}>{sync?'sync...':'sync ✓'}</span>
        <button onClick={()=>window._signOut()} style={{background:'none',border:'none',color:'#333',cursor:'pointer',padding:'2px 4px',marginLeft:2}}><OutIc/></button>
      </div>
      <div style={{maxWidth:480,margin:'0 auto',padding:'16px 16px 0'}}>
        {view==='home'        &&<HomeV {...sp}/>}
        {view==='addSaving'   &&<AddSavV {...sp}/>}
        {view==='accounts'    &&<AccsV {...sp}/>}
        {view==='expenses'    &&<ExpsV {...sp}/>}
        {view==='stats'       &&<StatsV {...sp}/>}
        {view==='goals'       &&<GoalsV {...sp}/>}
        {view==='investments' &&<InvsV {...sp}/>}
      </div>
      <BottomNav view={view} setView={setView}/>
    </div>
  );
};

// ── HOME ──────────────────────────────────────────────────────────────────────
const HomeV=({dist,uDist,accs,totBal,savs,setView})=>{
  const [ek,setEk]=useState(null);
  const [tp,setTp]=useState('');
  const col={madre:'#ff6b6b',inversion:'#22d3a5',ahorro:'#6c63ff',caprichos:'#f59e0b'};
  const save=k=>{const v=parseInt(tp);if(!isNaN(v)&&v>=0&&v<=100)uDist({...dist,[k]:{...dist[k],percentage:v}});setEk(null);setTp('')};
  return(
    <div style={{paddingTop:8,display:'flex',flexDirection:'column',gap:16}}>
      <div style={{background:'linear-gradient(135deg,#1e1b4b,#312e81)',borderRadius:20,padding:'22px 20px',border:'1px solid #3730a3',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:-20,right:-20,width:100,height:100,borderRadius:'50%',background:'rgba(108,99,255,.15)'}}/>
        <p style={{fontSize:11,color:'rgba(255,255,255,.5)',fontWeight:500,letterSpacing:1,textTransform:'uppercase',margin:0}}>Balance Total</p>
        <p style={{fontSize:38,fontWeight:700,margin:'4px 0 14px',fontFamily:'DM Mono',color:'#fff'}}>£{totBal.toFixed(2)}</p>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {accs.map(a=>(
            <div key={a.id} style={{background:'rgba(255,255,255,.07)',borderRadius:10,padding:'6px 12px',border:'1px solid rgba(255,255,255,.1)'}}>
              <p style={{margin:0,fontSize:10,color:'rgba(255,255,255,.4)'}}>{a.name}</p>
              <p style={{margin:0,fontSize:14,fontWeight:700,color:'#fff',fontFamily:'DM Mono'}}>£{a.balance.toFixed(2)}</p>
              <p style={{margin:0,fontSize:9,color:'rgba(255,255,255,.3)'}}>{a.type==='current'?'🏦 Corriente':a.type==='savings'?'💰 Ahorro':'📈 Inversión'}</p>
            </div>
          ))}
        </div>
      </div>
      <div className="card" style={{padding:20}}>
        <h3 style={{margin:'0 0 12px',fontSize:15,fontWeight:600}}>Distribución Mensual</h3>
        <div style={{height:8,borderRadius:4,overflow:'hidden',display:'flex',marginBottom:12}}>
          {Object.entries(dist).map(([k,v])=><div key={k} style={{width:`${v.percentage}%`,background:col[k],transition:'width .4s'}}/>)}
        </div>
        {Object.entries(dist).map(([k,item])=>(
          <div key={k} className="cl" style={{padding:'10px 14px',display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:10,height:10,borderRadius:'50%',background:col[k]}}/>
              <span style={{fontSize:13,color:'#c0c0c0'}}>{item.label}</span>
            </div>
            {ek===k?(
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <input className="inp" type="number" inputMode="numeric" value={tp} onChange={e=>setTp(e.target.value)} style={{width:56,padding:'6px 8px',textAlign:'center'}} autoFocus onBlur={()=>save(k)} onKeyDown={e=>{if(e.key==='Enter')save(k)}}/>
                <button onClick={()=>save(k)} style={{background:'#6c63ff',color:'#fff',border:'none',borderRadius:8,padding:'6px 10px',cursor:'pointer',fontSize:13,fontWeight:600}}>OK</button>
              </div>
            ):(
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:17,fontWeight:700,fontFamily:'DM Mono',color:col[k]}}>{item.percentage}%</span>
                <button onClick={()=>{setEk(k);setTp(item.percentage.toString())}} style={{background:'none',border:'none',color:'#444',cursor:'pointer',padding:4}}><EditIc/></button>
              </div>
            )}
          </div>
        ))}
      </div>
      <div className="card" style={{padding:20}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <h3 style={{margin:0,fontSize:15,fontWeight:600}}>Ahorro Mensual</h3>
          <button onClick={()=>setView('addSaving')} style={{background:'rgba(108,99,255,.15)',color:'#6c63ff',border:'none',borderRadius:8,padding:'6px 12px',fontSize:13,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:4}}><PlusIc/>Añadir</button>
        </div>
        {savs.length===0?<p style={{color:'#444',fontSize:13,textAlign:'center',padding:'8px 0',margin:0}}>Sin registros</p>:(
          <div style={{display:'flex',flexDirection:'column',gap:8}}>

// ── EXPENSES ──────────────────────────────────────────────────────────────────
const ExpsV=({cats,uCats,exps,uExps,mlist,uMlist})=>{
  const today=new Date();
  const defKey=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
  const initKey=mlist.find(m=>m.key===defKey)?.key||mlist[0]?.key||'';
  const [selKey,setSelKey]=useState(initKey);
  const [showCat,setShowCat]=useState(false);
  const [showMon,setShowMon]=useState(false);
  const [newCat,setNewCat]=useState('');
  const [eCat,setECat]=useState(null);
  const [tCat,setTCat]=useState('');
  const [local,setLocal]=useState({});
  const [nmName,setNmName]=useState('');
  const [nmYear,setNmYear]=useState('');

  const selMon=mlist.find(m=>m.key===selKey);

  useEffect(()=>{
    if(!selKey)return;
    const map={};
    cats.forEach(c=>{
      const e=exps.find(x=>x.cid===c.id&&x.mk===selKey);
      map[c.id]=e?e.amount.toString():(c.def?c.def.toString():'');
    });
    setLocal(map);
  },[selKey,cats.length]);

  const getAmt=cid=>{
    const e=exps.find(x=>x.cid===cid&&x.mk===selKey);
    return e?e.amount:(cats.find(c=>c.id===cid)?.def||0);
  };

  const commit=(cid,raw)=>{
    const amt=parseFloat(raw)||0;
    const idx=exps.findIndex(x=>x.cid===cid&&x.mk===selKey);
    let up;
    if(idx>=0){up=[...exps];up[idx]={...up[idx],amount:amt};}
    else up=[...exps,{id:Date.now(),cid,mk:selKey,amount:amt}];
    uExps(up);
  };

  const totM=cats.reduce((s,c)=>s+getAmt(c.id),0);

  // Donut chart
  const COLS=['#ff6b6b','#f59e0b','#22d3a5','#6c63ff','#ec4899','#8b5cf6','#10b981','#f97316'];
  const cd=cats.map((c,i)=>({name:c.name,amt:getAmt(c.id),col:COLS[i%8]})).filter(c=>c.amt>0);
  const cdTot=cd.reduce((s,c)=>s+c.amt,0);

  const Donut=()=>{
    const r=58,cx=76,cy=76,sw=16,circ=2*Math.PI*r;
    let off=0;
    return(
      <svg width={152} height={152} style={{display:'block',margin:'0 auto'}}>
        {cdTot===0?<circle cx={cx} cy={cy} r={r} fill="none" stroke="#2a2d3a" strokeWidth={sw}/>:
          cd.map((d,i)=>{
            const pct=d.amt/cdTot,dash=pct*circ;
            const el=<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={d.col} strokeWidth={sw} strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={-off*circ+circ/4} style={{transition:'all .5s'}}/>;
            off+=pct;return el;
          })
        }
        <text x={cx} y={cy-5} textAnchor="middle" fill="#f0f0f0" fontSize="13" fontWeight="700" fontFamily="DM Mono">£{cdTot.toFixed(0)}</text>
        <text x={cx} y={cy+10} textAnchor="middle" fill="#555" fontSize="9">total mes</text>
      </svg>
    );
  };

  const addMonth=()=>{
    const y=parseInt(nmYear);
    if(!nmName||isNaN(y)||y<2024||y>2035)return;
    const idx=MONTHS_ES.indexOf(nmName);if(idx<0)return;
    const key=`${y}-${String(idx+1).padStart(2,'0')}`;
    if(mlist.find(m=>m.key===key))return;
    const nl=[...mlist,{key,label:`${nmName} ${y}`,month:nmName,year:y}].sort((a,b)=>a.key.localeCompare(b.key));
    uMlist(nl);setNmName('');setNmYear('');setShowMon(false);
    setTimeout(()=>document.getElementById(`ch-${key}`)?.scrollIntoView({behavior:'smooth',inline:'center'}),300);
  };

  return(
    <div style={{paddingTop:8,display:'flex',flexDirection:'column',gap:14}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <h2 style={{margin:0,fontSize:22,fontWeight:700}}>Gastos</h2>
        <button onClick={()=>setShowCat(true)} className="bp" style={{width:'auto',padding:'10px 14px',display:'flex',alignItems:'center',gap:6,fontSize:13}}><PlusIc/>Categoría</button>
      </div>

      {showCat&&(
        <div className="card" style={{padding:16,display:'flex',flexDirection:'column',gap:10}}>
          <input type="text" placeholder="Nueva categoría" value={newCat} onChange={e=>setNewCat(e.target.value)} className="inp" autoFocus onKeyDown={e=>{if(e.key==='Enter'&&newCat.trim()){uCats([...cats,{id:Date.now(),name:newCat.trim(),def:0}]);setNewCat('');setShowCat(false)}}}/>
          <div style={{display:'flex',gap:10}}>
            <button onClick={()=>{if(newCat.trim()){uCats([...cats,{id:Date.now(),name:newCat.trim(),def:0}]);setNewCat('');setShowCat(false)}}} className="bp">Guardar</button>
            <button onClick={()=>setShowCat(false)} className="bs">Cancelar</button>
          </div>
        </div>
      )}

      {/* Month slider */}
      <div className="card" style={{padding:'14px 16px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <p style={{margin:0,fontSize:11,color:'#555',fontWeight:500,textTransform:'uppercase',letterSpacing:.5}}>Mes</p>
          <button onClick={()=>setShowMon(!showMon)} style={{background:'rgba(108,99,255,.12)',color:'#6c63ff',border:'none',borderRadius:6,padding:'4px 10px',fontSize:11,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:4}}><PlusIc/>Añadir mes</button>
        </div>
        {showMon&&(
          <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap'}}>
            <select value={nmName} onChange={e=>setNmName(e.target.value)} className="inp" style={{flex:1,minWidth:130,appearance:'none',background:'#0f1117',padding:'8px 12px',fontSize:13}}>
              <option value="">Mes</option>
              {MONTHS_ES.map(m=><option key={m} value={m}>{m}</option>)}
            </select>
            <input type="number" inputMode="numeric" placeholder="Año" value={nmYear} onChange={e=>setNmYear(e.target.value)} className="inp" style={{width:80,padding:'8px 12px',fontSize:13}}/>
            <button onClick={addMonth} style={{background:'#6c63ff',color:'#fff',border:'none',borderRadius:10,padding:'8px 14px',cursor:'pointer',fontWeight:600,fontSize:13}}>+</button>
          </div>
        )}
        <div className="msc">
          {mlist.map(m=>(
            <button id={`ch-${m.key}`} key={m.key} className={`mc ${selKey===m.key?'on':''}`} onClick={()=>setSelKey(m.key)}>
              {m.label}
            </button>
          ))}
        </div>
      </div>

      {selMon&&(
        <div className="card" style={{padding:20}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <h3 style={{margin:0,fontSize:15,fontWeight:600}}>{selMon.label}</h3>
            <span style={{fontFamily:'DM Mono',fontSize:14,color:'#ff6b6b',fontWeight:600}}>£{totM.toFixed(2)}</span>
          </div>
          {cdTot>0&&(
            <div style={{marginBottom:18}}>
              <Donut/>
              <div style={{display:'flex',flexWrap:'wrap',gap:6,justifyContent:'center',marginTop:10}}>
                {cd.map((d,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:4}}>
                    <div style={{width:8,height:8,borderRadius:2,background:d.col}}/>
                    <span style={{fontSize:11,color:'#888'}}>{d.name}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {cats.map(cat=>(
              <div key={cat.id} className="cl" style={{padding:'10px 14px',display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:14,color:'#c0c0c0',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{cat.name}</span>
                <span style={{color:'#444',fontSize:13}}>£</span>
                <input type="number" inputMode="decimal"
                  value={local[cat.id]??''}
                  onChange={e=>setLocal(p=>({...p,[cat.id]:e.target.value}))}
                  onBlur={e=>commit(cat.id,e.target.value)}
                  onKeyDown={e=>{if(e.key==='Enter'){commit(cat.id,local[cat.id]??'');e.target.blur()}}}
                  placeholder={cat.def||'0'}
                  className="inp" style={{width:80,textAlign:'right',padding:'8px 10px'}}
                />
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Manage cats */}
      <div className="card" style={{padding:20}}>
        <h3 style={{margin:'0 0 12px',fontSize:15,fontWeight:600}}>Gestionar Categorías</h3>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {cats.map(cat=>(
            <div key={cat.id} className="cl" style={{padding:'10px 14px',display:'flex',alignItems:'center',gap:8}}>
              {eCat===cat.id?(
                <>
                  <input type="text" value={tCat} onChange={e=>setTCat(e.target.value)} className="inp" style={{flex:1,padding:'8px 10px'}} autoFocus onKeyDown={e=>{if(e.key==='Enter'){if(tCat.trim())uCats(cats.map(c=>c.id===cat.id?{...c,name:tCat.trim()}:c));setECat(null)}}}/>
                  <button onClick={()=>{if(tCat.trim())uCats(cats.map(c=>c.id===cat.id?{...c,name:tCat.trim()}:c));setECat(null)}} style={{background:'#6c63ff',color:'#fff',border:'none',borderRadius:8,padding:'6px 12px',cursor:'pointer',fontSize:13,fontWeight:600}}>OK</button>
                </>
              ):(
                <>
                  <span style={{fontSize:14,color:'#c0c0c0',flex:1}}>{cat.name}</span>
                  {cat.def>0&&<span style={{fontSize:11,color:'#444',fontFamily:'DM Mono'}}>£{cat.def}</span>}
                  <button onClick={()=>{setECat(cat.id);setTCat(cat.name)}} style={{background:'none',border:'none',color:'#444',cursor:'pointer',padding:4}}><EditIc/></button>
                  <button onClick={()=>{if(confirm('¿Eliminar?')){uCats(cats.filter(c=>c.id!==cat.id));uExps(exps.filter(e=>e.cid!==cat.id))}}} style={{background:'none',border:'none',color:'#ff6b6b',cursor:'pointer',padding:4,opacity:.6}}><DelIc/></button>
                </>
              )}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

// ── STATS ─────────────────────────────────────────────────────────────────────
const StatsV=({cats,exps,totBal,totSav,mlist})=>{
  const COLS=['#ff6b6b','#f59e0b','#22d3a5','#6c63ff','#ec4899','#8b5cf6','#10b981','#f97316'];
  const ct=cats.map(c=>({name:c.name,amt:exps.filter(e=>e.cid===c.id).reduce((s,e)=>s+e.amount,0)})).filter(c=>c.amt>0);
  const tE=ct.reduce((s,c)=>s+c.amt,0);
  const mt=mlist.map(m=>({
    label:m.label.slice(0,6),
    tot:cats.reduce((s,c)=>{const e=exps.find(x=>x.cid===c.id&&x.mk===m.key);return s+(e?e.amount:(c.def||0));},0)
  })).filter(m=>m.tot>0).slice(-8);

        <div className="card" style={{padding:16}}><p style={{margin:'0 0 4px',fontSize:11,color:'#555',textTransform:'uppercase',letterSpacing:.5}}>En ahorro</p><p style={{margin:0,fontSize:22,fontWeight:700,fontFamily:'DM Mono',color:'#22d3a5'}}>£{totSav.toFixed(0)}</p></div>
      </div>
      {mt.length>0&&(
        <div className="card" style={{padding:20}}>
          <h3 style={{margin:'0 0 14px',fontSize:15,fontWeight:600}}>Gastos por Mes</h3>
          <div style={{display:'flex',alignItems:'flex-end',gap:5,height:100,overflowX:'auto',paddingBottom:2}}>
            {mt.map((m,i)=>(
              <div key={i} style={{flex:'0 0 auto',width:34,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                <span style={{fontSize:8,color:'#555',fontFamily:'DM Mono'}}>£{m.tot.toFixed(0)}</span>
                <div style={{width:'100%',background:'#6c63ff',borderRadius:'4px 4px 0 0',height:`${(m.tot/mx)*76}px`,minHeight:4}}/>
                <span style={{fontSize:8,color:'#555',textAlign:'center',lineHeight:1.2}}>{m.label}</span>
              </div>
            ))}
          </div>
        </div>
      )}
      {ct.length>0&&(
        <div className="card" style={{padding:20}}>
          <h3 style={{margin:'0 0 14px',fontSize:15,fontWeight:600}}>Por Categoría</h3>
          <div style={{height:8,borderRadius:4,overflow:'hidden',display:'flex',marginBottom:14}}>
            {ct.map((c,i)=><div key={i} style={{flex:c.amt,background:COLS[i%8]}}/>)}
          </div>
          {ct.sort((a,b)=>b.amt-a.amt).map((c,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
              <div style={{width:10,height:10,borderRadius:3,background:COLS[i%8],flexShrink:0}}/>
              <span style={{fontSize:13,color:'#c0c0c0',flex:1}}>{c.name}</span>
              <span style={{fontSize:13,fontFamily:'DM Mono',color:'#f0f0f0',fontWeight:500}}>£{c.amt.toFixed(0)}</span>
              <span style={{fontSize:11,color:'#555',fontFamily:'DM Mono',width:34,textAlign:'right'}}>{((c.amt/tE)*100).toFixed(0)}%</span>
            </div>
          ))}

      )}

            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>{const t=parseFloat(tt),p=parseFloat(tp);if(t>=0&&p>=0&&p<=t)uDebt({total:t,paid:p});setEd(false)}} className="bp">Guardar</button>
              <button onClick={()=>setEd(false)} className="bs">Cancelar</button>
            </div>
          </div>
        ):(
          <>
            <div style={{marginBottom:16}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}><span style={{fontSize:12,color:'#666'}}>Progreso</span><span style={{fontSize:12,fontFamily:'DM Mono',color:'#6c63ff',fontWeight:600}}>{pct.toFixed(1)}%</span></div>
              <div style={{height:10,background:'#1e2130',borderRadius:5,overflow:'hidden',border:'1px solid #2a2d3a'}}>
                <div style={{height:'100%',background:'linear-gradient(90deg,#6c63ff,#22d3a5)',width:`${pct}%`,borderRadius:5,transition:'width .6s'}}/>
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
              {[['Total','#f0f0f0',debt.total],['Pagado','#22d3a5',debt.paid]].map(([l,c,v])=>(
                <div key={l} className="cl" style={{padding:'12px 14px'}}><p style={{margin:'0 0 4px',fontSize:11,color:'#555'}}>{l}</p><p style={{margin:0,fontSize:18,fontWeight:700,fontFamily:'DM Mono',color:c}}>£{typeof v==='number'?v.toFixed(2):v}</p></div>
              ))}
              <div className="cl" style={{padding:'12px 14px',gridColumn:'span 2'}}><p style={{margin:'0 0 4px',fontSize:11,color:'#555'}}>Restante</p><p style={{margin:0,fontSize:22,fontWeight:700,fontFamily:'DM Mono',color:'#ff6b6b'}}>£{remDebt.toFixed(2)}</p></div>
            </div>
            <div style={{borderTop:'1px solid #2a2d3a',paddingTop:14}}>
              <p style={{fontSize:12,color:'#666',marginBottom:8}}>Registrar pago</p>
              <div style={{display:'flex',gap:8}}>
                <input type="number" inputMode="decimal" placeholder="Cantidad £" value={pa} onChange={e=>setPa(e.target.value)} className="inp" onKeyDown={e=>{if(e.key==='Enter'){const v=parseFloat(pa);if(v>0&&v<=remDebt){uDebt({...debt,paid:debt.paid+v});setPa('')}}}}/>
                <button onClick={()=>{const v=parseFloat(pa);if(v>0&&v<=remDebt){uDebt({...debt,paid:debt.paid+v});setPa('')}}} className="bp" style={{width:'auto',padding:'10px 18px',whiteSpace:'nowrap'}}>+ Añadir</button>
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
};

// ── INVESTMENTS ───────────────────────────────────────────────────────────────
const InvsV=({invs,uInvs})=>{
  const [show,setShow]=useState(false);
  const [nw,setNw]=useState({ticker:'',company:'',shares:'',buyPrice:'',buyDate:'',currency:'GBP'});
  const [prices,setPrices]=useState({});
  const [ldP,setLdP]=useState({});
  const [ana,setAna]=useState({});
  const [ldA,setLdA]=useState({});
  const [exp,setExp]=useState(null);

  const fetchPrice=async(ticker)=>{
    setLdP(p=>({...p,[ticker]:true}));
    try{
      const url=`https://api.allorigins.win/get?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d`)}`;
      const res=await fetch(url);
      const json=await res.json();
      const data=JSON.parse(json.contents);
      const meta=data?.chart?.result?.[0]?.meta;
      if(meta){
        const price=meta.regularMarketPrice;
        const prev=meta.previousClose||meta.chartPreviousClose;
        setPrices(p=>({...p,[ticker]:{price,change:price-prev,changePercent:((price-prev)/prev)*100,currency:meta.currency}}));
      }else setPrices(p=>({...p,[ticker]:{error:true}}));
    }catch{setPrices(p=>({...p,[ticker]:{error:true}}))}
    setLdP(p=>({...p,[ticker]:false}));
  };

  const getAna=async(inv)=>{
    setLdA(a=>({...a,[inv.id]:true}));setAna(a=>({...a,[inv.id]:null}));
    const p=prices[inv.ticker];
    const invested=inv.shares*inv.buyPrice;
    const cur=p?.price?p.price*inv.shares:null;
    const pl=cur?cur-invested:null;
    const plP=pl?((pl/invested)*100).toFixed(1):null;
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',max_tokens:450,
          tools:[{type:'web_search_20250305',name:'web_search'}],
          messages:[{role:'user',content:`Busca noticias recientes sobre ${inv.ticker} (${inv.company}). Invertí £${invested.toFixed(2)} a £${inv.buyPrice}/acc el ${inv.buyDate}.${pl!==null?` P&L: ${plP}% (${pl>=0?'+':''}£${pl.toFixed(2)}).`:''} Dame tu opinión honesta en 3 frases en español informal: qué tal va, algo notable reciente, y si mantendrías/comprarías más/venderías. Termina con un recordatorio de que no es asesoramiento financiero.`}]
        })
      });
      const d=await res.json();
      setAna(a=>({...a,[inv.id]:d.content?.map(c=>c.text||'').join('')||'Sin respuesta'}));
    }catch{setAna(a=>({...a,[inv.id]:'Error al conectar. Inténtalo de nuevo.'}))}
    setLdA(a=>({...a,[inv.id]:false}));
  };

  useEffect(()=>{invs.forEach(i=>fetchPrice(i.ticker));},[invs.length]);

  const tI=invs.reduce((s,i)=>s+i.shares*i.buyPrice,0);
  const tC=invs.reduce((s,i)=>{const p=prices[i.ticker];return s+(p?.price?p.price*i.shares:i.shares*i.buyPrice);},0);
  const tPL=tC-tI,tPLp=tI>0?((tPL/tI)*100):0;
  const sym=c=>c==='GBP'?'£':c==='EUR'?'€':'$';

  return(
    <div style={{paddingTop:8,display:'flex',flexDirection:'column',gap:14}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <h2 style={{margin:0,fontSize:22,fontWeight:700}}>Inversiones</h2>
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>invs.forEach(i=>fetchPrice(i.ticker))} style={{background:'#1e2130',border:'1px solid #2a2d3a',color:'#888',borderRadius:10,padding:'10px 12px',cursor:'pointer',display:'flex',alignItems:'center'}}><RefIc/></button>
          <button onClick={()=>setShow(true)} className="bp" style={{width:'auto',padding:'10px 14px',display:'flex',alignItems:'center',gap:6,fontSize:13}}><PlusIc/>Añadir</button>
        </div>
      </div>

      {invs.length>0&&(
        <div style={{background:'linear-gradient(135deg,#0f2922,#0d1f2d)',borderRadius:20,padding:20,border:'1px solid #1a3a30'}}>
          <p style={{margin:'0 0 2px',fontSize:11,color:'#555',textTransform:'uppercase',letterSpacing:1}}>Portfolio</p>
          <p style={{margin:'0 0 10px',fontSize:32,fontWeight:700,fontFamily:'DM Mono',color:'#fff'}}>£{tC.toFixed(2)}</p>
          <div style={{display:'flex',gap:16}}>
            <div><p style={{margin:'0 0 2px',fontSize:10,color:'#555'}}>Invertido</p><p style={{margin:0,fontFamily:'DM Mono',fontWeight:600,color:'#f0f0f0',fontSize:14}}>£{tI.toFixed(2)}</p></div>
            <div><p style={{margin:'0 0 2px',fontSize:10,color:'#555'}}>P&L</p><p style={{margin:0,fontFamily:'DM Mono',fontWeight:600,color:tPL>=0?'#22d3a5':'#ff6b6b',fontSize:14}}>{tPL>=0?'+':''}£{tPL.toFixed(2)} ({tPLp>=0?'+':''}{tPLp.toFixed(1)}%)</p></div>
          </div>
        </div>
      )}

      {show&&(
        <div className="card" style={{padding:20,display:'flex',flexDirection:'column',gap:12}}>
          <h3 style={{margin:'0 0 4px',fontSize:15,fontWeight:600}}>Nueva Posición</h3>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            {[['Ticker','AAPL','ticker',true],['Empresa','Apple','company',false],['Nº acciones','10','shares',false],['Precio compra','150','buyPrice',false],['Fecha','Enero 2025','buyDate',false]].map(([lb,ph,k,up])=>(
              <div key={k}><label style={{fontSize:11,color:'#555',display:'block',marginBottom:4}}>{lb}</label>
              <input type={k==='shares'||k==='buyPrice'?'number':'text'} inputMode={k==='shares'||k==='buyPrice'?'decimal':'text'} placeholder={ph} value={nw[k]} onChange={e=>setNw({...nw,[k]:up?e.target.value.toUpperCase():e.target.value})} className="inp" style={up?{textTransform:'uppercase'}:{}} /></div>
            ))}
            <div><label style={{fontSize:11,color:'#555',display:'block',marginBottom:4}}>Moneda</label>
            <select value={nw.currency} onChange={e=>setNw({...nw,currency:e.target.value})} className="inp" style={{appearance:'none',background:'#0f1117'}}>
              <option value="GBP">£ GBP</option><option value="EUR">€ EUR</option><option value="USD">$ USD</option>
            </select></div>
          </div>
          <div style={{display:'flex',gap:10,marginTop:4}}>
            <button onClick={()=>{if(nw.ticker&&nw.shares&&nw.buyPrice){const i={id:Date.now(),...nw,ticker:nw.ticker.toUpperCase(),shares:parseFloat(nw.shares),buyPrice:parseFloat(nw.buyPrice)};uInvs([...invs,i]);setNw({ticker:'',company:'',shares:'',buyPrice:'',buyDate:'',currency:'GBP'});setShow(false);setTimeout(()=>fetchPrice(i.ticker),300)}}} className="bp">Añadir</button>
            <button onClick={()=>setShow(false)} className="bs">Cancelar</button>
          </div>
        </div>
      )}

      {invs.length===0&&!show&&(
        <div className="card" style={{padding:40,textAlign:'center'}}><p style={{fontSize:36,margin:'0 0 8px'}}>📈</p><p style={{color:'#555',fontSize:14,margin:0}}>Sin inversiones aún</p></div>
      )}

      {invs.map(inv=>{
        const p=prices[inv.ticker],isLd=ldP[inv.ticker];
        const invested=inv.shares*inv.buyPrice;
        const cur=p?.price?p.price*inv.shares:null;
        const pl=cur?cur-invested:null;
        const plP=pl?((pl/invested)*100):null;
        const pos=pl!==null?pl>=0:true;
        const isExp=exp===inv.id;
        return(
          <div key={inv.id} className="card" style={{padding:20}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
              <div>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:2}}>
                  <span style={{fontSize:18,fontWeight:800,fontFamily:'DM Mono'}}>{inv.ticker}</span>
                  <span className="tag">{inv.currency}</span>
                </div>
                <p style={{margin:0,fontSize:13,color:'#666'}}>{inv.company}</p>
                <p style={{margin:'2px 0 0',fontSize:11,color:'#444'}}>{inv.buyDate} · {inv.shares} acc @ {sym(inv.currency)}{inv.buyPrice}</p>
              </div>
              <button onClick={()=>{if(confirm('¿Eliminar?'))uInvs(invs.filter(i=>i.id!==inv.id))}} style={{background:'none',border:'none',color:'#ff6b6b',cursor:'pointer',opacity:.6}}><DelIc/></button>
            </div>
            <div className="cl" style={{padding:'12px 14px',marginBottom:10}}>
              {isLd?(<div style={{display:'flex',gap:8,alignItems:'center'}}><div className="sh" style={{width:80,height:24}}/><span style={{fontSize:12,color:'#555'}}>Cargando...</span></div>)
              :p?.error?(<div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontSize:12,color:'#ff6b6b'}}>Error al cargar precio</span><button onClick={()=>fetchPrice(inv.ticker)} style={{background:'none',border:'none',color:'#6c63ff',cursor:'pointer',fontSize:12,display:'flex',alignItems:'center',gap:4}}><RefIc/>Reintentar</button></div>)
              :p?.price?(<div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end'}}><div><p style={{margin:'0 0 2px',fontSize:10,color:'#555'}}>Precio actual</p><p style={{margin:0,fontSize:24,fontWeight:700,fontFamily:'DM Mono'}}>{sym(p.currency||inv.currency)}{p.price?.toFixed(2)}</p></div><span className={pos?'tg':'tr'}>{pos?'▲':'▼'} {Math.abs(p.changePercent||0).toFixed(2)}%</span></div>)
              :(<button onClick={()=>fetchPrice(inv.ticker)} style={{background:'none',border:'none',color:'#6c63ff',cursor:'pointer',fontSize:12,display:'flex',alignItems:'center',gap:4}}><RefIc/>Cargar precio</button>)}
            </div>
            {pl!==null&&(
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:10}}>
                {[['Invertido',`${sym(inv.currency)}${invested.toFixed(2)}`,'#888'],['Ahora',`${sym(inv.currency)}${cur.toFixed(2)}`,pos?'#22d3a5':'#ff6b6b'],['P&L',`${pl>=0?'+':''}${plP.toFixed(1)}%`,pos?'#22d3a5':'#ff6b6b']].map(([l,v,c])=>(
                  <div key={l} className="cl" style={{padding:'8px',textAlign:'center'}}><p style={{margin:'0 0 2px',fontSize:9,color:'#555'}}>{l}</p><p style={{margin:0,fontSize:11,fontWeight:700,fontFamily:'DM Mono',color:c}}>{v}</p></div>
                ))}
              </div>
            )}
            <button onClick={()=>{const ne=isExp?null:inv.id;setExp(ne);if(!isExp)getAna(inv)}} style={{width:'100%',background:'rgba(34,211,165,.08)',color:'#22d3a5',border:'1px solid rgba(34,211,165,.15)',borderRadius:10,padding:'10px',cursor:'pointer',fontSize:13,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
              <StarIc/>{isExp?'Cerrar análisis':'Análisis Claude'}
            </button>
            {isExp&&(ldA[inv.id]||ana[inv.id])&&(
              <div style={{marginTop:10,background:'rgba(34,211,165,.04)',border:'1px solid rgba(34,211,165,.12)',borderRadius:12,padding:14}}>
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8}}><StarIc/><span style={{fontSize:12,fontWeight:600,color:'#22d3a5'}}>Opinión de Claude</span><span style={{fontSize:10,color:'#444'}}>(no es asesoramiento)</span></div>
                {ldA[inv.id]?(<div style={{display:'flex',flexDirection:'column',gap:6}}>{[100,80,90,60].map((w,i)=><div key={i} className="sh" style={{height:11,borderRadius:4,width:`${w}%`}}/>)}</div>)
                :<p style={{margin:0,fontSize:13,color:'#b0b0b0',lineHeight:1.7}}>{ana[inv.id]}</p>}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
};

// ── BOTTOM NAV ────────────────────────────────────────────────────────────────
const BottomNav=({view,setView})=>{
  const tabs=[
    {id:'home',label:'Inicio',icon:<HomeIc/>},
    {id:'accounts',label:'Cuentas',icon:<WalIc/>},
    {id:'expenses',label:'Gastos',icon:<TrIc/>},
    {id:'investments',label:'Inversión',icon:<InvIc/>},
    {id:'stats',label:'Stats',icon:<ChIc/>},
    {id:'goals',label:'Metas',icon:<TgIc/>},
  ];
  const on=id=>view===id||(id==='home'&&view==='addSaving');
  return(
    <div style={{position:'fixed',bottom:0,left:0,right:0,background:'rgba(15,17,23,.96)',backdropFilter:'blur(20px)',borderTop:'1px solid #1e2130',padding:'6px 2px',zIndex:100}}>
      <div style={{display:'flex',justifyContent:'space-around',maxWidth:480,margin:'0 auto'}}>
        {tabs.map(t=><button key={t.id} onClick={()=>setView(t.id)} className={`nb ${on(t.id)?'on':''}`}>{t.icon}<span>{t.label}</span></button>)}
      </div>
    </div>
  );
};

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
